name: CI

on:
  pull_request:
    branches: [main]

jobs:
  sdk-check:
    name: SDK — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv pip install --system -e ".[dev]"
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - run: mypy src/
      - run: pytest

  server-check:
    name: Server — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: postgresql+asyncpg://deliberate:deliberate@localhost:5432/deliberate
      SECRET_KEY: ci-test-secret-key-for-github-actions
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: deliberate
          POSTGRES_PASSWORD: deliberate
          POSTGRES_DB: deliberate
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv pip install --system -e ".[dev]"
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - run: mypy src/
      - run: pytest

  ui-check:
    name: UI — lint, typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm typecheck
