# Deliberate — Docker Compose setup (PRD §6.7)
# Four services: postgres, server, worker, ui

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: deliberate
      POSTGRES_PASSWORD: deliberate
      POSTGRES_DB: deliberate
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deliberate"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    profiles: ["dev"]
    ports:
      - "1025:1025"    # SMTP
      - "8025:8025"    # Web UI

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - ./examples/policies:/app/config/policies:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://deliberate:deliberate@postgres:5432/deliberate
      SECRET_KEY: ${SECRET_KEY}
      DEFAULT_APPROVER_EMAIL: ${DEFAULT_APPROVER_EMAIL:-}
      UI_URL: http://localhost:3000
      APPROVERS_FILE: config/approvers.yaml
      POLICIES_DIR: config/policies
      WEBHOOKS_FILE: config/webhooks.yaml
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@example.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Deliberate}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    ports:
      - "4000:4000"
    command: ["python", "-m", "deliberate_server.main"]

  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://deliberate:deliberate@postgres:5432/deliberate
      SECRET_KEY: ${SECRET_KEY}
      DEFAULT_APPROVER_EMAIL: ${DEFAULT_APPROVER_EMAIL:-approver@example.com}
    command: ["python", "-m", "deliberate_server.worker"]

  ui:
    build:
      context: ./ui
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      INTERNAL_API_URL: http://server:4000
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  pgdata:
