# Deliberate — Docker Compose setup (PRD §6.7)
# Four services: postgres, server, worker, ui

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: deliberate
      POSTGRES_PASSWORD: deliberate
      POSTGRES_DB: deliberate
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deliberate"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://deliberate:deliberate@postgres:5432/deliberate
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@example.com}
    ports:
      - "4000:4000"
    command: ["python", "-m", "deliberate_server.main"]

  worker:
    build:
      context: ./server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://deliberate:deliberate@postgres:5432/deliberate
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
    command: ["python", "-m", "deliberate_server.worker"]

  ui:
    build:
      context: ./ui
    environment:
      NEXT_PUBLIC_API_URL: http://server:4000
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  pgdata:
